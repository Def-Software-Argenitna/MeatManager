name: Bridge Desktop Release

on:
  push:
    tags:
      - "bridge-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: MeatManager-Bridge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: MeatManager-Bridge/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build installer and publish artifacts
        run: npx electron-builder --win nsis --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
