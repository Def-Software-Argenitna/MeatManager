name: Bridge Desktop Release

on:
  push:
    tags:
      - "bridge-v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: MeatManager-Bridge
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: MeatManager-Bridge/package-lock.json

      - name: Setup Python 3.11 (node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Force Python 3.11 for node-gyp
        shell: pwsh
        run: |
          $py = Join-Path $env:pythonLocation "python.exe"
          echo "PYTHON=$py" >> $env:GITHUB_ENV
          echo "NODE_GYP_FORCE_PYTHON=$py" >> $env:GITHUB_ENV
          echo "npm_config_python=$py" >> $env:GITHUB_ENV
          python --version
          & $py --version

      - name: Install setuptools for distutils compatibility
        run: |
          python -m pip install --upgrade pip setuptools
          python -c "import sys; print(sys.version)"
          python -c "import distutils; print('distutils ok')"

      - name: Install dependencies
        run: |
          npm ci
          npm ls node-gyp

      - name: Build installer and publish artifacts
        run: npx electron-builder --win nsis --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          PYTHON: ${{ env.PYTHON }}
          NODE_GYP_FORCE_PYTHON: ${{ env.PYTHON }}
          npm_config_python: ${{ env.PYTHON }}
