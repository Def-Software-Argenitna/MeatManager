name: Deploy Dev

on:
  push:
    branches:
      - dev

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: self-hosted
    env:
      REGISTRY: ghcr.io
      IMAGE_OWNER: ${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        id: owner
        run: echo "value=${IMAGE_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./MeatManager-web
          file: ./MeatManager-web/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.value }}/meatmanager-web:dev
          build-args: |
            VITE_API_URL=/api

      - uses: docker/build-push-action@v6
        with:
          context: ./MeatManager-API
          file: ./MeatManager-API/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.value }}/meatmanager-api:dev

      - name: Deploy dev stack on self-hosted runner
        env:
          GHCR_NAMESPACE: ghcr.io/${{ steps.owner.outputs.value }}
          MAIN_DOMAIN: meatmanager.def-software.com
          DEMO_DOMAIN: meatmanager.demo.def-software.com
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          API_MAIN_ENV: ${{ secrets.API_MAIN_ENV }}
          API_DEV_ENV: ${{ secrets.API_DEV_ENV }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p "${DEPLOY_PATH}/env" "${DEPLOY_PATH}/secrets" "${DEPLOY_PATH}/nginx"
          cp deploy/docker-compose.cloud.yml "${DEPLOY_PATH}/docker-compose.cloud.yml"
          cp deploy/nginx/meatmanager.def-software.com.conf "${DEPLOY_PATH}/nginx/meatmanager.def-software.com.conf"
          cp deploy/nginx/meatmanager.demo.def-software.com.conf "${DEPLOY_PATH}/nginx/meatmanager.demo.def-software.com.conf"
          cat > "${DEPLOY_PATH}/.env" <<EOF
            GHCR_NAMESPACE=${GHCR_NAMESPACE}
            MAIN_DOMAIN=${MAIN_DOMAIN}
            DEMO_DOMAIN=${DEMO_DOMAIN}
            EOF
          printf "%s" "${API_MAIN_ENV}" > "${DEPLOY_PATH}/env/api-main.env"
          printf "%s" "${API_DEV_ENV}" > "${DEPLOY_PATH}/env/api-dev.env"
          printf "%s" "${FIREBASE_SERVICE_ACCOUNT_JSON}" > "${DEPLOY_PATH}/secrets/firebase-service-account.json"
          chmod 600 "${DEPLOY_PATH}/secrets/firebase-service-account.json"
          cd "${DEPLOY_PATH}"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker compose -f docker-compose.cloud.yml --env-file .env pull web-dev api-dev
          docker compose -f docker-compose.cloud.yml --env-file .env up -d web-dev api-dev
