services:
  web-main:
    image: ${GHCR_NAMESPACE}/meatmanager-web:${WEB_MAIN_TAG:-main}
    container_name: meatmanager-web-main
    restart: unless-stopped
    ports:
      - "127.0.0.1:4100:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - shared_proxy

  api-main:
    image: ${GHCR_NAMESPACE}/meatmanager-api:${API_MAIN_TAG:-main}
    container_name: meatmanager-api-main
    restart: unless-stopped
    env_file:
      - ./env/api-main.env
    volumes:
      - ./secrets/firebase-service-account.json:/app/firebase-service-account.json:ro
    ports:
      - "127.0.0.1:4101:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - shared_proxy

  web-dev:
    image: ${GHCR_NAMESPACE}/meatmanager-web:${WEB_DEV_TAG:-dev}
    container_name: meatmanager-web-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:4200:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - shared_proxy

  api-dev:
    image: ${GHCR_NAMESPACE}/meatmanager-api:${API_DEV_TAG:-dev}
    container_name: meatmanager-api-dev
    restart: unless-stopped
    env_file:
      - ./env/api-dev.env
    volumes:
      - ./secrets/firebase-service-account.json:/app/firebase-service-account.json:ro
    ports:
      - "127.0.0.1:4201:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - shared_proxy

networks:
  shared_proxy:
    external: true
    name: gestionclientes_gestionclientes_net
