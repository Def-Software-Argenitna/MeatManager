services:
  redis:
    image: redis:7-alpine
    container_name: meatmanager-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis/users.acl:/usr/local/etc/redis/users.acl:ro
    command: redis-server --appendonly yes --aclfile /usr/local/etc/redis/users.acl
    healthcheck:
      test: ["CMD", "redis-cli", "--user", "root", "--pass", "pos38ric0S", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  redis_data:
